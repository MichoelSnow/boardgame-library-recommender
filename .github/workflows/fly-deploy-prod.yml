# Manual promotion workflow for production deploys after dev validation.

name: Fly Deploy Prod
on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag, or commit SHA to deploy to production"
        required: false
        default: "main"
      config_file:
        description: "Fly config file to deploy"
        required: true
        default: "fly.toml"
        type: choice
        options:
          - fly.toml
          - fly.convention.toml
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy prod app
    runs-on: ubuntu-latest
    concurrency: deploy-prod
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}
      - name: Install flyctl
        run: |
          curl -fsSL https://fly.io/install.sh | sh
          echo "${HOME}/.fly/bin" >> "${GITHUB_PATH}"
      - name: Build metadata
        run: |
          echo "BUILD_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "DEPLOY_GIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Deploy
        run: |
          flyctl deploy --remote-only \
            -c "${{ inputs.config_file }}" \
            -a "bg-lib-app" \
            --build-arg GIT_SHA="${{ env.DEPLOY_GIT_SHA }}" \
            --build-arg BUILD_TIMESTAMP="${{ env.BUILD_TIMESTAMP }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
