name: CI

on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read
  pull-requests: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notebook output/layout hygiene
        run: |
          python scripts/validate/validate_notebook_outputs.py
      - name: Notebook secret-pattern scan
        run: |
          python scripts/validate/validate_notebook_secrets.py

  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: npm audit baseline policy (frontend)
        run: |
          python scripts/validate/validate_frontend_audit.py

  python-quality:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "DUMMY_CI_ONLY_SECRET_KEY_NOT_FOR_PRODUCTION_12345"
      DATABASE_PATH: "/tmp/pax_tt_ci.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
      - name: Install Python dependencies
        run: |
          poetry install --no-interaction --with dev
      - name: Poetry metadata check
        run: |
          poetry check
      - name: Python format check
        run: |
          poetry run ruff format --check backend data_pipeline scripts
      - name: Python lint check
        run: |
          poetry run ruff check backend data_pipeline scripts
      - name: Python import sanity check
        run: |
          poetry run python -m compileall backend data_pipeline scripts
      - name: Python tests (full suite)
        run: |
          poetry run pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Frontend quality + build + tests
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build
          npm run test:ci
