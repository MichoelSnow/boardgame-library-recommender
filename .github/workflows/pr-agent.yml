name: PR Agent

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr_agent:
    if: github.event.pull_request.draft == false && !startsWith(github.event.pull_request.title, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: PR Agent preflight
        shell: bash
        env:
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          echo "pr_agent_preflight is_fork=${IS_FORK}"
          if [[ -n "${GEMINI_API_KEY:-}" ]]; then
            echo "pr_agent_preflight gemini_secret_present=true"
          else
            echo "pr_agent_preflight gemini_secret_present=false"
          fi

          if [[ -z "${GEMINI_API_KEY:-}" ]]; then
            if [[ "${IS_FORK}" == "true" ]]; then
              echo "error: GEMINI_API_KEY is unavailable for this fork PR."
              echo "error: Enable 'Send secrets to workflows from pull requests' for forks or use a hardened pull_request_target workflow."
            else
              echo "error: GEMINI_API_KEY is missing or empty in repository/org secrets."
            fi
            exit 1
          fi

      - name: Normalize and validate Gemini key
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          normalized="$(printf '%s' "${GEMINI_API_KEY}" | tr -d '\r\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          if [[ -z "${normalized}" ]]; then
            echo "error: normalized GEMINI_API_KEY is empty after trimming."
            exit 1
          fi
          echo "GEMINI_API_KEY_SANITIZED=${normalized}" >> "${GITHUB_ENV}"
          echo "pr_agent_preflight gemini_key_length=${#normalized}"

          http_code="$(
            curl -sS \
              -o /tmp/gemini_models_response.json \
              -w "%{http_code}" \
              "https://generativelanguage.googleapis.com/v1beta/models?key=${normalized}"
          )"

          if [[ "${http_code}" != "200" ]]; then
            echo "error: Gemini API key validation failed (HTTP ${http_code})."
            echo "error: Ensure the key is valid for Google AI Studio Generative Language API and has no API/app restrictions blocking this runner."
            echo "response_snippet=$(head -c 300 /tmp/gemini_models_response.json | tr '\n' ' ')"
            exit 1
          fi

      - name: Run PR agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY_SANITIZED }}
          GOOGLE_API_KEY: ${{ env.GEMINI_API_KEY_SANITIZED }}
          GOOGLE_GEMINI_API_KEY: ${{ env.GEMINI_API_KEY_SANITIZED }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ env.GEMINI_API_KEY_SANITIZED }}
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ env.GEMINI_API_KEY_SANITIZED }}
          GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
          GOOGLE_DEFAULT_API_BASE: "https://generativelanguage.googleapis.com/v1beta"
          config.model: "gemini/gemini-3-flash-preview"
          config.fallback_models: '["gemini/gemini-2.5-flash", "gemini/gemini-2.5-flash-lite"]'
          config.max_model_tokens: "40000"
          config.custom_model_max_tokens: "40000"
          config.max_description_tokens: "400"
          config.max_commits_tokens: "400"
          pr_description.max_ai_calls: "2"
          pr_description.enable_large_pr_handling: "false"
          pr_description.enable_pr_diagram: "false"
          pr_code_suggestions.max_number_of_calls: "1"
          pr_code_suggestions.parallel_calls: "false"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.pr_actions: '["opened", "reopened"]'
