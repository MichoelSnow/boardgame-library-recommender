name: Prod Health Alerts

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prod-health-alerts:
    runs-on: ubuntu-latest
    concurrency: prod-health-alerts
    steps:
      - uses: actions/checkout@v5

      - name: Restore alert state cache
        uses: actions/cache@v4
        with:
          path: .alert_state/prod_health_alert_state.json
          key: prod-health-alert-state-${{ github.run_id }}
          restore-keys: |
            prod-health-alert-state-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate alert path wiring (static)
        run: python scripts/validate/validate_prod_alert_path.py --env prod --skip-runtime

      - name: Run Production Health Alerts
        run: python scripts/alerts/run_prod_health_alerts.py --env prod
