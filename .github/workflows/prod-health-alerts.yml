name: Prod Health Alerts

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  prod-health-alerts:
    runs-on: ubuntu-latest
    concurrency: prod-health-alerts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Production Health Alerts
        run: python scripts/run_prod_health_alerts.py --env prod
