# fly.convention.toml app configuration file for pax-tt-app convention profile

app = 'pax-tt-app'
primary_region = 'iad'

[env]
  DATABASE_PATH = "/data/boardgames.db"
  RUNTIME_PROFILE = "convention"
  APP_SERVER = "gunicorn"
  GUNICORN_WORKERS = "2"
  CONVENTION_MODE = "true"
  DB_KEEPALIVE_ENABLED = "true"
  DB_KEEPALIVE_INTERVAL_SECONDS = "60"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-4x'

[mounts]
  source = "boardgames_data"
  destination = "/data"

[[restart]]
  policy = "on-failure"
  retries = 3

[processes]
  app = "/app/start.sh"
