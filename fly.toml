# fly.toml app configuration file generated for bg-lib-app on 2025-07-05T22:37:45-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bg-lib-app'
primary_region = 'iad'

[env]
  DATABASE_PATH = "/data/boardgames.db"
  RUNTIME_PROFILE = "standard"
  APP_SERVER = "uvicorn"
  CONVENTION_MODE = "false"
  DB_KEEPALIVE_ENABLED = "true"
  DB_KEEPALIVE_INTERVAL_SECONDS = "60"
  IMAGE_BACKEND = "fly_local"
  IMAGE_STORAGE_DIR = "/data/images"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-4x'
  memory = 2048

[mounts]
  source = "boardgames_data"
  destination = "/data"
  initial_size = "4GB"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit = "10GB"

[[restart]]
  policy = "on-failure"
  retries = 3

[processes]
  app = "/app/start.sh"
