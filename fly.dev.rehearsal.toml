# fly.dev.rehearsal.toml app configuration file for bg-lib-app-dev rehearsal profile

app = 'bg-lib-app-dev'
primary_region = 'iad'

[env]
  NODE_ENV = "production"
  RUNTIME_PROFILE = "rehearsal"
  APP_SERVER = "gunicorn"
  GUNICORN_WORKERS = "3"
  GUNICORN_CMD_ARGS = "--timeout 90"
  CONVENTION_MODE = "false"
  DB_KEEPALIVE_ENABLED = "true"
  DB_KEEPALIVE_INTERVAL_SECONDS = "60"
  IMAGE_BACKEND = "fly_local"
  IMAGE_STORAGE_DIR = "/data/images"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-4x'
  memory = 2048

[mounts]
  source = "boardgames_data_dev"
  destination = "/data"

[[restart]]
  policy = "on-failure"
  retries = 3

[processes]
  app = "/app/start.sh"
