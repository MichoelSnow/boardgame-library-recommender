# fly.dev.toml app configuration file for pax-tt-app-dev

app = 'pax-tt-app-dev'
primary_region = 'iad'

[env]
  DATABASE_PATH = "/data/boardgames.db"
  RUNTIME_PROFILE = "standard"
  APP_SERVER = "uvicorn"
  CONVENTION_MODE = "false"
  DB_KEEPALIVE_ENABLED = "true"
  DB_KEEPALIVE_INTERVAL_SECONDS = "60"
  IMAGE_BACKEND = "fly_local"
  IMAGE_STORAGE_DIR = "/data/images"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-4x'
  memory = 2048

[mounts]
  source = "boardgames_data_dev"
  destination = "/data"

[[restart]]
  policy = "on-failure"
  retries = 3

[processes]
  app = "/app/start.sh"
