app = "your-app-name"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  DATABASE_PATH = "/data/boardgames.db"
  DATABASE_DIR = "/app/backend/database"

[[mounts]]
  source = "boardgames_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

[processes]
  app = "uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"

[deploy]
  release_command = "alembic upgrade head" 